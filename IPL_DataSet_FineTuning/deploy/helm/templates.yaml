apiVersion: apps/v1
kind: Deployment
metadata:
  name: cricket-inference
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: cricket-inference
  template:
    metadata:
      labels:
        app: cricket-inference
    spec:
      containers:
      - name: app
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        ports:
        - containerPort: 8000
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-secret
              key: token
        resources:
          limits:
            nvidia.com/gpu: 1
---
apiVersion: v1
kind: Service
metadata:
  name: cricket-inference
spec:
  type: {{ .Values.service.type }}
  selector:
    app: cricket-inference
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
